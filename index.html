<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhishek - Devoloper Portfolio </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .poppins-regular {
            font-family: "Poppins", sans-serif;
            font-weight: 400;
            font-style: normal;
        }



        * {
            margin: 0;
            padding: 0;
        }

        body {
            background-color: rgb(19, 23, 23);
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            background-color: rgb(139, 220, 0);
        }

        nav ul {
            display: flex;
            justify-content: center;
        }

        nav ul li {
            list-style: none;
            margin: 0 23px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
        }

        nav ul li a:hover {
            color: red;
            font-size: 1.01rem;
        }

        main hr{
            border: 0;
            background: greenyellow;
            height: 1.2px;
            margin: 60px 84px;

        }

        .left {
            font-size: 1.5rem;
        }

        .firstSection {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;

        }

        .firstSection>div {
            width: 30%;
            /* background-color: red; */
        }

        .leftSection {
            /* background-color: rgb(126, 235, 96); */
            font-size: 2.5rem;
            margin: 20px 0px;
        }

        .rightSection img {
            /* background-color: rgb(126, 235, 96); */
            width: 80%;
            margin: 0px;
        }

        #element {
            color: red;
        }
        .secondSection{
            max-width: 80vw;
            margin: auto;
        }
        .text-grey{
            color: grey;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="left">Abhishek's Portfolio</div>
            <div class="right" style="font-weight:10;">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/">About</a></li>
                    <li><a href="/">Services</a></li>
                    <li><a href="/">Projects</a></li>
                    <li><a href="/">Contact Me</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section class="firstSection">

            <div class="leftSection">
                Hi , My name is <span style="color: red ;">Abhishek</span>
                and I am a Passionate
                <br>
                <div><span id="element"></span></div>
            </div>
            <div class="rightSection">
                <img src="bg.png" alt="Abhishek this side">
            </div>
        </section>
        <hr>
        <section class="secondSection">
            <span class="text-grey">Work i have done so far</span>
            <h1>Work Experience</h1>
        </section>
    </main>
    <script src="https://unpkg.com/typed.js@3.0.0/dist/typed.umd.js"></script>
    <script>
        var typed = new Typed('#element', {
            strings: ['Web Devoloper.', 'AI engineer.', 'Problem Solver.', 'Video Editor.'],
            typeSpeed: 40,
        });
    </script>
</body>

</html>
